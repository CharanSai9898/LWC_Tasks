<template>
      <!-- Salesforce card container with title and lock icon -->
    <lightning-card title="Password Field" icon-name="utility:lock">

    <!-- Adds padding around the content inside the card -->
        <div class="slds-p-around_medium">

            <h4>Enter password</h4>

            <!-- Grid layout to place input box and copy icon on the same row -->
            <div class="slds-grid slds-align_absolute-center">

                <div class="input-container">

                    <input
                        class="slds-input password-input"
                        type={inputType}
                        value={password}
                        onchange={handlePasswordChange}
                        placeholder="Type Password  here...."/>

                    <lightning-button-icon
                        icon-name={eyeIcon}
                        variant="bare"
                        class="eye-icon"
                        onclick={togglePassword}>
                    </lightning-button-icon>

                </div>

                <lightning-button-icon
                    icon-name="utility:copy"
                    variant="bare"
                    class="copy-icon"
                    onclick={copyPassword}>
                </lightning-button-icon>

            </div>

            <template if:true={copied}>
                <p class="success">Copied!</p>
            </template>

        </div>

    </lightning-card>
    <c-test-component></c-test-component>
</template>
