<template>
<lightning-card title="Case Dashboard" icon-name="standard:case">
    <div class="slds-m-around_medium">
        <div class="slds-grid slds-wrap slds-gutters">

            <!-- Total Cases -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium square-box">
                <div class="slds-box totalCasesBox"
                     data-filter="Total_Cases"
                     onclick={handleCardClick}>
                    <p>Total Cases</p>
                    <h1 class="slds-text-heading_large">{stats.totalCases}</h1>
                </div>
            </div>

            <!-- Open Cases -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium square-box">
                <div class="slds-box slds-theme_success"
                     data-filter="Open_Cases"
                     onclick={handleCardClick}>
                    <p>Open Cases</p>
                    <h1 class="slds-text-heading_large">{stats.openCases}</h1>
                </div>
            </div>

            <!-- Closed Cases -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium square-box">
                <div class="slds-box slds-theme_error"
                     data-filter="Closed_Cases"
                     onclick={handleCardClick}>
                    <p>Closed Cases</p>
                    <h1 class="slds-text-heading_large">{stats.closedCases}</h1>
                </div>
            </div>

            <!-- High Priority -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium square-box">
                <div class="slds-box slds-theme_warning"
                     data-filter="High_Priority"
                     onclick={handleCardClick}>
                    <p>High Priority</p>
                    <h1 class="slds-text-heading_large">{stats.highPriority}</h1>
                </div>
            </div>

            <!-- Medium Priority -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium square-box">
                <div class="slds-box medium_priority"
                     data-filter="Medium_Priority"
                     onclick={handleCardClick}>
                    <p>Medium Priority</p>
                    <h1 class="slds-text-heading_large">{stats.mediumPriority}</h1>
                </div>
            </div>

            <!-- Low Priority -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium square-box">
                <div class="slds-box slds-theme_alt-inverse "
                     data-filter="Low_Priority"
                     onclick={handleCardClick}>
                    <p>Low Priority</p>
                    <h1 class="slds-text-heading_large">{stats.lowPriority}</h1>
                </div>
            </div>

            <!-- Cases This Month -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium square-box">
                <div class="slds-box monthCasesBox"
                     data-filter="Cases_This_Month"
                     onclick={handleCardClick}>
                    <p>Cases This Month</p>
                    <h1 class="slds-text-heading_large">{stats.casesThisMonth}</h1>
                </div>
            </div>

            <!-- Datatable -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_medium datatable-box">
                <lightning-card class="slds-m-top_medium">
                    Cases By Origin
                    <lightning-datatable key-field="Origin" data={data} columns={columns} hide-checkbox-column>
                    </lightning-datatable>
                </lightning-card>
            </div>

        </div>
    </div>
</lightning-card>
</template>
