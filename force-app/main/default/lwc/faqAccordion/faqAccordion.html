<template>
     <lightning-card title="FAQs - Frequently Asked Questions" icon-name="action:add_file">
        
        
        <div class="slds-text-align_center  custom-margin ">
            <lightning-input type ="toggle" label ="Allow only one FAQ open at a time" checked={isSingleOpen} onchange={handleToggle}  onclick={stopPropagation}>   
            </lightning-input>
            </div>
            <!-- FAQ List -->
        
           <template for:each={faqs} for:item="faq">
                <div key={faq.id} class="faq-box" data-id={faq.id} onclick={handleClick}>

               
                    <div class="faq-header"><span>{faq.question}</span>
                    <span class="icon">
                            <lightning-icon icon-name={faq.iconName}  size="small"></lightning-icon>
                        </span>
                    </div>

              
                    <template if:true={faq.open}>
                         <div class="faq-body">{faq.answer}</div>
                    </template>

                </div>
            </template>
            
    </lightning-card>
</template>
